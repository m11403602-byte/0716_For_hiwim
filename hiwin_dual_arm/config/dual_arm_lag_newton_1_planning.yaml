planning_plugin: dual_arm_lag_newton_planner_1/DualArmLagNewtonPlannerManager
request_adapters: >-
  default_planner_request_adapters/FixWorkspaceBounds
  default_planner_request_adapters/FixStartStateBounds
  default_planner_request_adapters/FixStartStateCollision
  default_planner_request_adapters/FixStartStatePathConstraints


# ===== 常調參數 =====
path_weight: 0.5            # A/B 臂成本權重 pw*fA+(1-pw)*fB, 範圍 [0,1]
danger_threshold: 0.4       # 危險因子閾值 (判撞門檻 = 此值 + collision_tolerance)
collision_tolerance: 0.1    # 碰撞判定緩衝帶
fix_tolerance: 0.1          # find_targets 的 fix_gap 比例
max_refinement_iter: 15     # 外層修復最多輪數

# ===== 軌跡平滑權重 =====
smooth_w: 1.0               # 平滑項主權重
smooth_w_H: 1.0             # Head 端權重
smooth_w_T: 1.0             # Tail 端權重
smooth_w_neighbor: 1.0      # 鄰點權重

# ===== 純 Lagrangian 參數 [NEW] (對應 Dual_Arm_Lagrangian_Gradient_v2; 原硬編碼值開放) =====
#   ⚠ λ/S 為決策變數初值 (非 ALM 外層乘子); 收斂靠可行性 (phys+stable), 非 ‖G‖
lag_wd: 1.0                    # 對偶強度 w_d (penalty 係數; 原始值 1)
lag_lam0: 30.0                 # λ_0 初值 (⚠ MATLAB 註解寫 10, 實際 code = 30)
lag_s0: 1.0                    # S_0 初值 (S²=1; 原始值 1)
lag_tol_phys_margin: 0.01      # 物理收斂容差 max_D ≤ θ + margin (原始值 0.01)
lag_tol_stable: 0.005          # 穩定收斂容差 |Δmax_D| ≤ 此值 (原始值 0.005)
lag_tol_stat: 0.1              # ⚠ Newton 啟用: stationarity 收斂 ‖G‖ ≤ 此值 (原始值 0.1; GD/CG 不用)
lag_max_iter: 500              # 主迴圈最大迭代 (原始值 500)

# ===== 關節名前綴 (依 SRDF 調整) =====
joint_prefix_A: "big_joint_"      # A 臂 (RA610): big_joint_1 ~ big_joint_6
joint_prefix_B: "small_joint_"    # B 臂 (RA605): small_joint_1 ~ small_joint_6

# ===== 時間參數化 (在插件內處理) =====
# ⚠ 由於改在插件內做時間參數化, 請從 pipeline 的 request_adapters
#    移除 default_planner_request_adapters/AddTimeOptimalParameterization
#    (否則 adapter 會再跑一次 TOTG, 覆蓋 time_optimal=false 的等間隔設定)
time_optimal: true          # true=TOTG 時間最佳化; false=自訂等間隔
path_total_time: 5.0        # (time_optimal=false 時) 目標軌跡總時間 (秒)
min_time_interval: 0.05     # (time_optimal=false 時) 每點最小時間間隔 (秒)

# ===== 診斷輸出 (預設全關) =====
export_csv_prefix: "./data"       # 非空 → 整合匯出: 建子目錄 <prefix>/<unix秒>_GD/ (失敗也匯出)
export_level: 2             # 0=完全不匯出(總開關)
                            # 1=論文標配 6 檔 (meta/summary/inner/danger_final/danger_rounds/targets)
                            # 2=完整 9 檔 (+constraints_all/path_original/path_evolution)
                            #   例 "/tmp/lag_gd"; 規劃失敗也匯出 (利於除錯); 動態可調 (ros2 param set)
solver_verbose: false       # true → 內層逐迭代記錄 G/d 全向量 (耗記憶體, 深掘/論文用)